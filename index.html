<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#000000">
  <title>Streaming Dictation</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
  <link rel="apple-touch-icon" href="icon-192.png">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      background: #000000;
      color: #FFFFFF;
      font-family: -apple-system, BlinkMacSystemFont, Arial, sans-serif;
      overflow: hidden;
    }

    .app {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    /* Password gate */
    .auth-gate {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      gap: 12px;
    }

    .auth-gate input {
      background: #1a1a1a;
      color: #FFFFFF;
      border: 1px solid #333333;
      border-radius: 6px;
      padding: 12px 16px;
      font-size: 16px;
      font-family: inherit;
      width: 280px;
      outline: none;
    }

    .auth-gate input:focus {
      border-color: #2563eb;
    }

    .auth-gate button {
      background: #2563eb;
      color: #FFFFFF;
      border: none;
      padding: 10px 24px;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
      font-family: inherit;
    }

    .auth-gate button:hover {
      background: #1d4ed8;
    }

    /* Caption display */
    .caption-display {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 24px 32px;
      overflow: hidden;
      position: relative;
    }

    .caption-display::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 40%;
      background: linear-gradient(to bottom, #000000 0%, transparent 100%);
      pointer-events: none;
      z-index: 1;
    }

    .caption-text {
      font-size: var(--caption-size, 5vw);
      font-weight: 700;
      line-height: 2.0;
      word-wrap: break-word;
      overflow-wrap: break-word;
      white-space: pre-wrap;
    }

    /* Toolbar */
    .toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      background: #111111;
      border-top: 1px solid #333333;
    }

    .toolbar-spacer {
      flex: 1;
    }

    .toolbar button {
      background: #333333;
      color: #FFFFFF;
      border: none;
      padding: 6px 14px;
      border-radius: 4px;
      font-size: 14px;
      cursor: pointer;
      font-family: inherit;
    }

    .toolbar button:hover {
      background: #444444;
    }

    .toolbar .btn-start {
      background: #16a34a;
    }

    .toolbar .btn-start:hover {
      background: #15803d;
    }

    .toolbar .btn-stop {
      background: #dc2626;
    }

    .toolbar .btn-stop:hover {
      background: #b91c1c;
    }

    .toolbar .btn-fullscreen {
      background: #2563eb;
    }

    .toolbar .btn-fullscreen:hover {
      background: #1d4ed8;
    }

    /* Status indicator */
    .status {
      font-size: 13px;
      color: #888888;
    }

    .status.listening {
      color: #16a34a;
    }

    .status.error {
      color: #dc2626;
    }

    /* Audio level meter */
    .level-meter {
      display: none;
      width: 60px;
      height: 14px;
      background: #222222;
      border-radius: 3px;
      overflow: hidden;
    }

    .level-meter.active {
      display: block;
    }

    .level-meter-fill {
      height: 100%;
      width: 0%;
      background: #16a34a;
      border-radius: 3px;
      transition: width 0.08s ease-out, background-color 0.15s;
    }

    .level-meter-fill.loud {
      background: #eab308;
    }
  </style>
</head>
<body>
  <!-- Auth gate -->
  <div class="auth-gate" id="authGate">
    <input type="password" id="passwordInput" placeholder="Enter password" autofocus>
    <button id="authSubmit">Connect</button>
  </div>

  <!-- Main app (hidden until authenticated) -->
  <div class="app" id="app" style="display: none;">
    <div class="caption-display" id="captionDisplay">
      <div class="caption-text" id="captionText"></div>
    </div>

    <div class="toolbar" id="toolbar">
      <button class="btn-start" id="btnMic">Start</button>
      <span class="status" id="status">Ready</span>
      <div class="level-meter" id="levelMeter"><div class="level-meter-fill" id="levelFill"></div></div>
      <button class="btn-clear" id="btnClear">Clear</button>
      <button class="btn-export" id="btnExport">Export</button>
      <div class="toolbar-spacer"></div>
      <button id="btnSizeDown">A-</button>
      <button id="btnSizeUp">A+</button>
      <button class="btn-fullscreen" id="btnFullscreen">Fullscreen</button>
      <span style="font-size:10px;color:#555;margin-left:8px">v2026.04.19a</span>
    </div>
  </div>

  <script>
    (function () {
      // ── Config ──
      const MODAL_WS_URL = 'wss://bbuchalter--streaming-dictation-streamingdictation-web.modal.run';

      const BUFFER_LIMIT = 5000;
      const STORAGE_KEY = 'dictation-transcript';
      const AUDIO_BUFFER_MAX = 40; // ~10 seconds at 250ms chunks
      const HEARTBEAT_INTERVAL = 15000; // 15s ping to detect dead connections

      // ── DOM ──
      const authGate = document.getElementById('authGate');
      const passwordInput = document.getElementById('passwordInput');
      const authSubmit = document.getElementById('authSubmit');
      const appEl = document.getElementById('app');
      const captionText = document.getElementById('captionText');
      const captionDisplay = document.getElementById('captionDisplay');
      const btnMic = document.getElementById('btnMic');
      const btnClear = document.getElementById('btnClear');
      const btnExport = document.getElementById('btnExport');
      const levelMeter = document.getElementById('levelMeter');
      const levelFill = document.getElementById('levelFill');
      const btnFullscreen = document.getElementById('btnFullscreen');
      const btnSizeDown = document.getElementById('btnSizeDown');
      const btnSizeUp = document.getElementById('btnSizeUp');
      const statusEl = document.getElementById('status');

      // ── State ──
      let sessionToken = sessionStorage.getItem('sessionToken') || '';
      let isRecording = false;
      let transcript = localStorage.getItem(STORAGE_KEY) || '';
      let ws = null;
      let mediaRecorder = null;
      let micStream = null;
      let audioCtx = null;
      let analyser = null;
      let levelRAF = null;
      let audioBuffer = [];
      let reconnectAttempts = 0;
      let reconnectTimer = null;
      let heartbeatTimer = null;
      let intentionalStop = false;

      // ── Font size ──
      const SIZES = [3, 4, 5, 6, 7, 8, 10];
      let sizeIndex = 2;

      function applySize() {
        document.documentElement.style.setProperty('--caption-size', SIZES[sizeIndex] + 'vw');
      }

      // ── Status ──
      function setStatus(text, cls) {
        statusEl.textContent = text;
        statusEl.className = 'status' + (cls ? ' ' + cls : '');
      }

      // ── Auth ──
      async function authenticate() {
        const token = passwordInput.value.trim();
        if (!token) return;
        authSubmit.disabled = true;
        authSubmit.textContent = 'Verifying...';

        try {
          const valid = await verifyToken(token);
          if (valid) {
            sessionToken = token;
            sessionStorage.setItem('sessionToken', token);
            showApp();
          } else {
            sessionStorage.removeItem('sessionToken');
            authSubmit.textContent = 'Invalid password';
            setTimeout(() => { authSubmit.textContent = 'Connect'; authSubmit.disabled = false; }, 2000);
          }
        } catch (err) {
          authSubmit.textContent = 'Connection error';
          setTimeout(() => { authSubmit.textContent = 'Connect'; authSubmit.disabled = false; }, 2000);
        }
      }

      function verifyToken(token) {
        return new Promise((resolve) => {
          const testWs = new WebSocket(MODAL_WS_URL + '/stream?token=' + encodeURIComponent(token));
          testWs.onmessage = (e) => {
            try {
              const msg = JSON.parse(e.data);
              if (msg.type === 'status' && msg.data === 'listening') {
                testWs.send('EOS');
                testWs.close();
                resolve(true);
              }
            } catch (_) {}
          };
          testWs.onclose = (e) => {
            if (e.code === 4001) resolve(false);
          };
          testWs.onerror = () => resolve(false);
          setTimeout(() => { testWs.close(); resolve(false); }, 10000);
        });
      }

      function showApp() {
        authGate.style.display = 'none';
        appEl.style.display = 'flex';
        renderDisplay();
      }

      authSubmit.addEventListener('click', authenticate);
      passwordInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') authenticate();
      });

      if (sessionToken) {
        verifyToken(sessionToken).then((valid) => {
          if (valid) showApp();
          else { sessionStorage.removeItem('sessionToken'); sessionToken = ''; }
        }).catch(() => { sessionStorage.removeItem('sessionToken'); sessionToken = ''; });
      }

      // ── Caption display ──
      function renderDisplay() {
        const tail = transcript.length > BUFFER_LIMIT
          ? transcript.slice(transcript.length - BUFFER_LIMIT)
          : transcript;
        captionText.textContent = tail;
        captionDisplay.scrollTop = captionDisplay.scrollHeight;
      }

      function appendText(text) {
        if (!text) return;
        if (transcript.length > 0 && !transcript.endsWith(' ') && !transcript.endsWith('\n')) {
          transcript += ' ';
        }
        transcript += text;
        localStorage.setItem(STORAGE_KEY, transcript);
        renderDisplay();
      }

      // ── Toolbar: Clear ──
      btnClear.addEventListener('click', (e) => {
        e.stopPropagation();
        transcript = '';
        localStorage.removeItem(STORAGE_KEY);
        captionText.textContent = '';
      });

      // ── Toolbar: Export ──
      btnExport.addEventListener('click', (e) => {
        e.stopPropagation();
        if (!transcript) return;
        const now = new Date();
        const pad = (n) => String(n).padStart(2, '0');
        const timestamp = [
          now.getFullYear(), pad(now.getMonth() + 1), pad(now.getDate()),
          '-', pad(now.getHours()), pad(now.getMinutes()), pad(now.getSeconds())
        ].join('');
        const blob = new Blob([transcript], { type: 'text/plain' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `dharma-talk-${timestamp}.txt`;
        a.click();
        URL.revokeObjectURL(url);
      });

      // ── Toolbar: Fullscreen ──
      btnFullscreen.addEventListener('click', (e) => {
        e.stopPropagation();
        if (document.fullscreenElement) {
          document.exitFullscreen();
        } else {
          document.documentElement.requestFullscreen();
        }
      });

      document.addEventListener('fullscreenchange', () => {
        btnFullscreen.textContent = document.fullscreenElement ? 'Exit Fullscreen' : 'Fullscreen';
      });

      // ── Toolbar: Font size ──
      btnSizeDown.addEventListener('click', (e) => {
        e.stopPropagation();
        if (sizeIndex > 0) { sizeIndex--; applySize(); }
      });

      btnSizeUp.addEventListener('click', (e) => {
        e.stopPropagation();
        if (sizeIndex < SIZES.length - 1) { sizeIndex++; applySize(); }
      });

      // ── Audio level meter via AnalyserNode ──
      function startLevelMeter(stream) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const source = audioCtx.createMediaStreamSource(stream);
        analyser = audioCtx.createAnalyser();
        analyser.fftSize = 256;
        source.connect(analyser);

        const dataArray = new Uint8Array(analyser.frequencyBinCount);

        function updateMeter() {
          analyser.getByteFrequencyData(dataArray);
          let sum = 0;
          for (let i = 0; i < dataArray.length; i++) sum += dataArray[i];
          const avg = sum / dataArray.length;
          const pct = Math.min(100, avg * 1.5);
          levelFill.style.width = pct + '%';
          levelFill.classList.toggle('loud', pct > 70);
          levelRAF = requestAnimationFrame(updateMeter);
        }
        updateMeter();
      }

      function stopLevelMeter() {
        if (levelRAF) { cancelAnimationFrame(levelRAF); levelRAF = null; }
        if (audioCtx) { audioCtx.close(); audioCtx = null; }
        analyser = null;
        levelFill.style.width = '0%';
      }

      // ── Word-by-word streaming ──
      let streamQueue = [];
      let streaming = false;

      function streamText(text) {
        const words = text.split(' ');
        if (transcript.length > 0) {
          streamQueue.push('\n');
        }
        streamQueue.push(...words);
        if (!streaming) drainQueue();
      }

      function drainQueue() {
        if (streamQueue.length === 0) { streaming = false; return; }
        streaming = true;
        appendText(streamQueue.shift());
        setTimeout(drainQueue, 60);
      }

      // ── Heartbeat ──
      function startHeartbeat() {
        stopHeartbeat();
        heartbeatTimer = setInterval(() => {
          if (ws && ws.readyState === WebSocket.OPEN) {
            try { ws.send('PING'); } catch (_) {}
          } else if (isRecording && !intentionalStop) {
            // Connection silently died
            stopHeartbeat();
            attemptReconnect();
          }
        }, HEARTBEAT_INTERVAL);
      }

      function stopHeartbeat() {
        if (heartbeatTimer) { clearInterval(heartbeatTimer); heartbeatTimer = null; }
      }

      // ── WebSocket connection ──
      function connectWebSocket() {
        ws = new WebSocket(MODAL_WS_URL + '/stream?token=' + encodeURIComponent(sessionToken));

        ws.onopen = () => {
          reconnectAttempts = 0;
          startHeartbeat();
          // Flush buffered audio chunks
          while (audioBuffer.length > 0) {
            const chunk = audioBuffer.shift();
            if (ws.readyState === WebSocket.OPEN) ws.send(chunk);
          }
        };

        ws.onmessage = (e) => {
          try {
            const msg = JSON.parse(e.data);
            switch (msg.type) {
              case 'status':
                if (msg.data === 'listening') {
                  setStatus('Listening...', 'listening');
                } else if (msg.data === 'disconnected') {
                  setStatus('Server reconnecting...', '');
                }
                break;
              case 'text':
                streamText(msg.data);
                break;
              case 'error':
                console.error('Server error:', msg.data);
                setStatus('Error: ' + msg.data, 'error');
                break;
            }
          } catch (_) {}
        };

        ws.onclose = (e) => {
          stopHeartbeat();
          if (intentionalStop || e.code === 4001) return;
          if (isRecording) {
            attemptReconnect();
          }
        };

        ws.onerror = () => {};
      }

      function attemptReconnect() {
        reconnectAttempts++;
        // Backoff: 1s, 2s, 4s, 8s, then stay at 8s forever
        const delay = Math.min(1000 * Math.pow(2, reconnectAttempts - 1), 8000);
        setStatus(`Reconnecting (attempt ${reconnectAttempts})...`, '');
        reconnectTimer = setTimeout(connectWebSocket, delay);
      }

      // ── Recording ──
      function startRecording() {
        if (isRecording) return;
        isRecording = true;
        intentionalStop = false;
        reconnectAttempts = 0;
        audioBuffer = [];
        btnMic.textContent = 'Stop';
        btnMic.className = 'btn-stop';
        setStatus('Connecting...', '');
        levelMeter.classList.add('active');

        navigator.mediaDevices.getUserMedia({ audio: true }).then((stream) => {
          micStream = stream;
          startLevelMeter(stream);

          mediaRecorder = new MediaRecorder(stream, {
            mimeType: 'audio/webm;codecs=opus',
            audioBitsPerSecond: 24000,
          });

          mediaRecorder.ondataavailable = (e) => {
            if (e.data.size === 0) return;
            if (ws && ws.readyState === WebSocket.OPEN) {
              ws.send(e.data);
            } else {
              audioBuffer.push(e.data);
              if (audioBuffer.length > AUDIO_BUFFER_MAX) audioBuffer.shift();
            }
          };

          mediaRecorder.start(250);
          connectWebSocket();
        }).catch((err) => {
          console.error('Mic access denied:', err);
          setStatus('Mic access denied', 'error');
          stopRecording();
        });
      }

      function stopRecording() {
        intentionalStop = true;
        isRecording = false;
        btnMic.textContent = 'Start';
        btnMic.className = 'btn-start';
        setStatus('Ready', '');
        stopHeartbeat();
        levelMeter.classList.remove('active');

        if (reconnectTimer) { clearTimeout(reconnectTimer); reconnectTimer = null; }

        if (mediaRecorder && mediaRecorder.state !== 'inactive') {
          mediaRecorder.stop();
        }
        mediaRecorder = null;

        if (ws && ws.readyState === WebSocket.OPEN) {
          ws.send('EOS');
          ws.close();
        }
        ws = null;

        if (micStream) {
          micStream.getTracks().forEach(t => t.stop());
          micStream = null;
        }

        stopLevelMeter();
        audioBuffer = [];
      }

      // ── Mic button ──
      btnMic.addEventListener('click', () => {
        if (isRecording) {
          stopRecording();
        } else {
          startRecording();
        }
      });

    })();

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('service-worker.js');
    }
  </script>
</body>
</html>
